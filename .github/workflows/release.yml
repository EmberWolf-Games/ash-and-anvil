name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Semantic version (e.g. 0.1.0 — without leading v)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          if ! echo "$VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$'; then
            echo "Invalid semver: $VERSION"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Build Foundry package and manifest
        run: node utils/release/build-release.mjs "${{ steps.version.outputs.version }}"

      - name: Create source archive
        run: |
          git archive \
            --format=tar.gz \
            --prefix=ash-and-anvil/ \
            -o "dist/release/ash-and-anvil-${{ steps.version.outputs.version }}-source.tar.gz" \
            HEAD

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          target_commitish: ${{ github.sha }}
          name: Ash & Anvil ${{ steps.version.outputs.version }}
          generate_release_notes: true
          make_latest: true
          files: |
            dist/release/system.json
            dist/release/ash-and-anvil.zip
            dist/release/ash-and-anvil-${{ steps.version.outputs.version }}-source.tar.gz
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
