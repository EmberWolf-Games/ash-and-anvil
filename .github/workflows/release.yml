name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      version:
        description: "Optional override version (e.g. 0.1.0). Leave empty to use system.json."
        required: false
        type: string

concurrency:
  group: release-main
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version
        id: version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION=$(jq -r .version system.json)
          fi
          if ! echo "$VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$'; then
            echo "Invalid semver: $VERSION"
            exit 1
          fi
          TAG="v${VERSION}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          if git ls-remote --tags origin "refs/tags/${TAG}" | grep -q "${TAG}"; then
            echo "publish=false" >> "$GITHUB_OUTPUT"
            echo "Tag ${TAG} already exists on origin — skipping release."
          else
            echo "publish=true" >> "$GITHUB_OUTPUT"
            echo "Will publish release ${TAG}."
          fi

      - name: Setup Node
        if: steps.version.outputs.publish == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Build Foundry package and manifest
        if: steps.version.outputs.publish == 'true'
        run: node utils/release/build-release.mjs "${{ steps.version.outputs.version }}"

      - name: Create source archive
        if: steps.version.outputs.publish == 'true'
        run: |
          git archive \
            --format=tar.gz \
            --prefix=ash-and-anvil/ \
            -o "dist/release/ash-and-anvil-${{ steps.version.outputs.version }}-source.tar.gz" \
            HEAD

      - name: Publish GitHub Release
        if: steps.version.outputs.publish == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          target_commitish: ${{ github.sha }}
          name: Ash & Anvil ${{ steps.version.outputs.version }}
          generate_release_notes: true
          make_latest: true
          files: |
            dist/release/system.json
            dist/release/ash-and-anvil.zip
            dist/release/ash-and-anvil-${{ steps.version.outputs.version }}-source.tar.gz
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
